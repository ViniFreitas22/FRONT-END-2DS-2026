<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3 caixas centralizadas</title>
    <style>
        body{
            width: 100%;
            height: 100vh;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .caixa{
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .caixa_numero{
            color: white;
            height: 100px;
            width: 100px;
            background-color: blue;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 10px;
        }
    </style>
</head>
<body>
    <div class="caixa">
        <div class="caixa_numero">1</div>
        <div class="caixa_numero">2</div>
        <div class="caixa_numero">3</div>
    </div>
</body>
</html>
